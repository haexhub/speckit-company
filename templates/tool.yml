id: "{{id}}"                # unique slug, lowercase-hyphenated
name: "{{name}}"            # human label
type: mcp                   # mcp | builtin | custom

# For type=mcp:
transport: stdio            # stdio | sse | http
command: "{{command}}"      # binary or interpreter
args: []                    # CLI args
env_keys: []                # env-var names this tool requires (e.g. API tokens)

description: "{{description}}"

# Informational: capabilities a typical agent author should grant to use this
# tool meaningfully. The validator does NOT enforce these — runtime
# (capability-gate.js) is the actual gate. Treat this list as documentation,
# not a contract.
required_capabilities: []

tags:                       # free-form labels for catalog browsing
  - {{tag}}
