schema_version: "1.0"

extension:
  id: speckit-company
  name: "Company Workflow"
  version: "0.1.0"
  description: "Spec-driven multi-agent companies. Define a CEO, hire workers in a reports-to graph, and deploy to a Hermes-backed runtime that pulls tasks from a queue."
  author: "haex"
  repository: "https://github.com/haexhub/speckit-company"
  license: MIT
  homepage: "https://github.com/haexhub/speckit-company"

requires:
  speckit_version: ">=0.2.0"
  tools:
    - name: node
      required: true
      version: ">=22"
    - name: hermes
      required: false
      version: ">=0.6"
    - name: nix
      required: true
      version: ">=2.18"

provides:
  commands:
    - name: speckit-company.init
      file: commands/speckit-company.init.md
      description: "Bootstrap a new company: scaffold .specify/org/, then chain the 8-step setup workflow."
    - name: speckit-company.vision
      file: commands/speckit-company.vision.md
      description: "Step 1: Define the company's purpose, success criteria, and scope."
    - name: speckit-company.roadmap
      file: commands/speckit-company.roadmap.md
      description: "Step 2: Define task types, workflow stages, and data flows."
    - name: speckit-company.org-design
      file: commands/speckit-company.org-design.md
      description: "Step 3: AI derives agent topology from the roadmap. Propose roles, reports-to, interfaces."
    - name: speckit-company.governance
      file: commands/speckit-company.governance.md
      description: "Step 4: Configure operating mode, autonomy, budget, and reporting cadence."
    - name: speckit-company.hire
      file: commands/speckit-company.hire.md
      description: "Step 5: Hire (or edit) any agent role. Idempotent. Reads spec from .specify/org/specs/<role>.md if present."
    - name: speckit-company.pipeline
      file: commands/speckit-company.pipeline.md
      description: "Step 6: Define ingress sources, egress sinks, and quality gates."
    - name: speckit-company.validate
      file: commands/speckit-company.validate.md
      description: "Step 7: Full consistency check — graph integrity, tools, models, mode-constraints, setup completeness."
    - name: speckit-company.start
      file: commands/speckit-company.start.md
      description: "Step 8: Hand the company over to the runtime: activate CEO, start queue polling."
      is_run: true

  config:
    - name: "company.yml"
      template: "templates/config.yml"
      description: "Optional per-company runtime overrides (queue paths, hermes binary)."
      required: false

tags:
  - "workflow"
  - "orchestration"
  - "multi-agent"
  - "spec-driven"
  - "hermes"
  - "company"
